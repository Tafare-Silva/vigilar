{% extends "core/base.html" %}
{% block title %}Em breve{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;">
  <div style="width:64px;height:64px;background:#f0f4ff;border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
    <i data-lucide="hammer" style="width:30px;height:30px;color:#2748e8;"></i>
  </div>
  <h2 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:700;color:#0f172a;margin-bottom:8px;">Módulo em desenvolvimento</h2>
  <p style="color:#64748b;font-size:0.9rem;max-width:380px;line-height:1.6;">
    Este módulo está sendo construído. Em breve estará disponível com todas as funcionalidades.
  </p>
  <a href="{% url 'dashboard:index' %}" class="btn btn-primary" style="margin-top:24px;">
    <i data-lucide="arrow-left" style="width:15px;height:15px;"></i> Voltar ao Dashboard
  </a>
</div>
{% endblock %}
